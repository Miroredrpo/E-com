{% extends "base.html" %}

{% block title %}Store Name — Premium Nepali Clothing{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="hero" style="position: relative; overflow: hidden;">
    <div class="hero-bg-shapes">
        <!-- Handbag Outline -->
        <svg class="doodle doodle-1" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect class="doodle-stroke" x="4" y="8" width="16" height="12" rx="2" ry="2" />
            <path class="doodle-stroke" d="M8 8V6a4 4 0 018 0v2" />
        </svg>
        
        <!-- Shirt Outline -->
        <svg class="doodle doodle-2" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path class="doodle-stroke" d="M20.38 3.46 16 2a8.59 8.59 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.27 1.5l-1 5.5a2 2 0 0 0 1.92 2.38H5v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-10h1.73a2 2 0 0 0 1.92-2.38l-1-5.5a2 2 0 0 0-1.27-1.55Z"/>
        </svg>

        <!-- Floral / Leaf Outline -->
        <svg class="doodle doodle-3" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path class="doodle-stroke" d="M12 22v-9m0 0C7.5 13 4 9.5 4 5c3.5 0 8 2.5 8 8zm0 0c4.5 0 8-3.5 8-8-3.5 0-8 2.5-8 8z" />
        </svg>
        
        <!-- Abstract Dots -->
        <svg class="doodle doodle-4" width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="3" class="doodle-fill" />
            <circle cx="40" cy="10" r="3" class="doodle-fill-light" />
            <circle cx="70" cy="10" r="3" class="doodle-fill" />
            <circle cx="25" cy="40" r="3" class="doodle-fill-light" />
            <circle cx="55" cy="40" r="3" class="doodle-fill" />
            <circle cx="10" cy="70" r="3" class="doodle-fill-light" />
            <circle cx="40" cy="70" r="3" class="doodle-fill" />
            <circle cx="70" cy="70" r="3" class="doodle-fill-light" />
        </svg>

        <!-- Hanger Outline -->
        <svg class="doodle doodle-5" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path class="doodle-stroke" d="M12 2.5a2.5 2.5 0 0 1 2.5 2.5c0 1.3-1.2 2.1-2.5 3.1V9l9 5.5a1 1 0 0 1-.5 1.5H3.5a1 1 0 0 1-.5-1.5L12 9" />
        </svg>

        <!-- Diamond Outline -->
        <svg class="doodle doodle-6" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path class="doodle-stroke" d="M6 3h12l4 6-10 12L2 9l4-6z" />
            <path class="doodle-stroke" d="M2 9h20M12 21V9M6 3l2 6M18 3l-2 6" />
        </svg>

        <!-- Sparkle Fill -->
        <svg class="doodle doodle-7" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path class="doodle-fill" d="M12 0C12 6.6 17.4 12 24 12C17.4 12 12 17.4 12 24C12 17.4 6.6 12 0 12C6.6 12 12 6.6 12 0Z" />
        </svg>
    </div>
    <div class="container" style="position: relative; z-index: 1;">
        <h1>Discover Authentic Nepali Craftsmanship</h1>
        <p>Handwoven textiles and contemporary designs, delivered to your door. Cash on Delivery available.</p>
    </div>
</section>

<!-- Products Section -->
<section class="container" style="padding-top: var(--space-4); padding-bottom: var(--space-8);">
    <div class="section-header">
        <h2>Our Collection</h2>
    </div>

    <div id="product-grid" class="product-grid">
        <!-- Skeleton loaders shown while products load -->
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-text medium" style="margin-top:12px;"></div>
            <div class="skeleton-text short"></div>
            <div class="skeleton-btn"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-text medium" style="margin-top:12px;"></div>
            <div class="skeleton-text short"></div>
            <div class="skeleton-btn"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-text medium" style="margin-top:12px;"></div>
            <div class="skeleton-text short"></div>
            <div class="skeleton-btn"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-image"></div>
            <div class="skeleton-text medium" style="margin-top:12px;"></div>
            <div class="skeleton-text short"></div>
            <div class="skeleton-btn"></div>
        </div>
    </div>
</section>
{% endblock %}
